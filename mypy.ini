[mypy]
strict = True
warn_unused_configs = True
python_version = 3.13
files = coding_ethos, pre-commit/hooks
plugins = pydantic.mypy
exclude = (^|/)tests/|(^|/).*_test\.py$|(^|/)test_.*\.py$|(^|/)\.venv/

[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True
