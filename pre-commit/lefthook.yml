        - "**/*.py"
      exclude:
        - ".venv/**"
        - "**/.venv/**"
        - "tests/**"
        - "**/tests/**"
      run: "{go_hook} check-structured-logging {push_files}"

    - name: Ban SQL strings outside configured SQL module
