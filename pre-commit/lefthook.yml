        - "tests/**"
        - "**/tests/**"
      run: "{go_hook} check-file-docstrings {push_files}"

    - name: Validate manifest.yaml
      glob: "**/manifest.yaml"
      run: "{go_hook} validate-manifest"

    - name: Pytest gate
