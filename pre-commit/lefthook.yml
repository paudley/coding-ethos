      run: >-
        {go_worktree_env} &&
        go vet ./...

    - name: Go format check
      glob: "**/*.go"
      run: >-
        {go_worktree_env} &&
        test -z "$(gofmt -l .)" ||
        (gofmt -l . && exit 1)

    - name: Go tests
      glob: "**/*.go"
      run: >-
        {go_worktree_env} &&
        go test ./...

    - name: golangci-lint
      glob: "**/*.go"
      run: >-
        {require_golangci_lint} &&
        {go_worktree_env} &&
        {go_lint_env} &&
        golangci-lint run --config "${REPO_GOLANGCI_CONFIG}"

commit-msg:
  parallel: false
  jobs:
    - name: Lint commit message
      run: "{go_hook} commitlint {1}"

    - name: Block AI attribution in commits
      run: "{go_hook} commit-attribution {1}"
