name: Bug report
description: Report a reproducible defect in coding-ethos.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal, reproducible report.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues first.
          required: true
        - label: I can reproduce this on the current `main` branch or latest release.
          required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version or commit are you using?
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and uv version
      placeholder: "Ubuntu 24.04, Python 3.13.5, uv 0.8.x"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest sequence that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Generate ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
      description: Paste command output, stack traces, or diffs if relevant.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps explain the issue.
